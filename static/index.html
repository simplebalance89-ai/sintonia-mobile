<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="/manifest.json">
<title>Sinton.ia Mobile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--surface:#1a1a1a;--border:#2a2a2a;--text:#e0e0e0;--dim:#888;--accent:#4CAF50;--accent-dim:#2e7d32;--user-bg:#1b3a1b;--danger:#d32f2f}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;height:100dvh;gap:24px}
#pin-screen h1{font-size:20px;color:var(--accent);letter-spacing:2px}
#pin-screen .subtitle{font-size:13px;color:var(--dim)}
.pin-dots{display:flex;gap:12px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--accent);background:transparent;transition:background .15s}
.pin-dot.filled{background:var(--accent)}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
.pin-btn{width:72px;height:72px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:24px;font-weight:300;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent}
.pin-btn:active{background:var(--accent-dim)}
.pin-error{color:var(--danger);font-size:13px;min-height:20px}
#chat-screen{display:none;flex-direction:column;height:100vh;height:100dvh}
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);min-height:52px;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:10px}
.header-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.header-title{font-size:15px;font-weight:600;letter-spacing:1px}
.header-actions{display:flex;gap:8px}
.header-btn{background:none;border:1px solid var(--border);color:var(--dim);padding:6px 10px;border-radius:6px;font-size:12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.header-btn:active{background:var(--accent-dim);color:#fff;border-color:var(--accent)}
.header-btn.ship{border-color:var(--accent);color:var(--accent)}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.msg{max-width:88%;padding:10px 14px;border-radius:16px;font-size:15px;line-height:1.5;word-wrap:break-word;white-space:pre-wrap}
.msg.user{align-self:flex-end;background:var(--user-bg);border-bottom-right-radius:4px}
.msg.assistant{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.thinking{align-self:flex-start;background:var(--surface);border:1px solid var(--border);color:var(--dim);font-style:italic}
.input-bar{display:flex;align-items:flex-end;gap:8px;padding:10px 12px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.input-bar textarea{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:20px;font-size:15px;font-family:inherit;resize:none;max-height:120px;min-height:42px;line-height:1.4;outline:none}
.input-bar textarea:focus{border-color:var(--accent)}
.input-bar textarea::placeholder{color:var(--dim)}
.input-btn{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.mic-btn{background:var(--surface);border:1px solid var(--border)!important;color:var(--dim);font-size:18px}
.mic-btn.recording{background:var(--danger);color:#fff;border-color:var(--danger)!important;animation:pulse 1s infinite}
.send-btn{background:var(--accent);color:#fff;font-size:18px}
.send-btn:disabled{opacity:.4}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:90%;max-width:400px}
.modal h3{margin-bottom:16px;color:var(--accent);font-size:16px}
.modal label{display:block;font-size:13px;color:var(--dim);margin-bottom:4px}
.modal input,.modal select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:8px;font-size:14px;margin-bottom:12px;outline:none}
.modal-actions{display:flex;gap:8px;margin-top:8px}
.modal-actions button{flex:1;padding:10px;border-radius:8px;font-size:14px;cursor:pointer;border:none}
.modal-actions .cancel{background:var(--bg);color:var(--dim);border:1px solid var(--border)}
.modal-actions .confirm{background:var(--accent);color:#fff}
.ship-status{font-size:12px;color:var(--dim);margin-top:8px;text-align:center;min-height:18px}
@supports(padding:env(safe-area-inset-bottom)){.input-bar{padding-bottom:calc(10px + env(safe-area-inset-bottom))}.header{padding-top:calc(12px + env(safe-area-inset-top))}}
</style>
</head>
<body>
<div id="pin-screen">
<h1>SINTON.IA</h1>
<div class="subtitle">MOBILE</div>
<div class="pin-dots" id="pin-dots"><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div></div>
<div class="pin-error" id="pin-error"></div>
<div class="pin-pad">
<button class="pin-btn" onclick="pinInput('1')">1</button>
<button class="pin-btn" onclick="pinInput('2')">2</button>
<button class="pin-btn" onclick="pinInput('3')">3</button>
<button class="pin-btn" onclick="pinInput('4')">4</button>
<button class="pin-btn" onclick="pinInput('5')">5</button>
<button class="pin-btn" onclick="pinInput('6')">6</button>
<button class="pin-btn" onclick="pinInput('7')">7</button>
<button class="pin-btn" onclick="pinInput('8')">8</button>
<button class="pin-btn" onclick="pinInput('9')">9</button>
<button class="pin-btn" style="visibility:hidden"></button>
<button class="pin-btn" onclick="pinInput('0')">0</button>
<button class="pin-btn" onclick="pinDelete()">&#9003;</button>
</div>
</div>
<div id="chat-screen">
<div class="header">
<div class="header-left"><div class="header-dot"></div><div class="header-title">SINTON.IA</div></div>
<div class="header-actions">
<button class="header-btn" onclick="clearChat()">Clear</button>
<button class="header-btn ship" onclick="openShipModal()">Ship It</button>
</div>
</div>
<div class="messages" id="messages"></div>
<div class="input-bar">
<button class="input-btn mic-btn" id="mic-btn" onclick="toggleVoice()">&#127908;</button>
<textarea id="input" placeholder="Talk to Sinton.ia..." rows="1" onkeydown="handleKey(event)"></textarea>
<button class="input-btn send-btn" id="send-btn" onclick="sendMessage()">&#10148;</button>
</div>
</div>
<div class="modal-overlay" id="ship-modal">
<div class="modal">
<h3>Ship It</h3>
<label>Title</label>
<input type="text" id="ship-title" placeholder="What's this about?">
<label>Tag</label>
<select id="ship-tag">
<option value="sinton.ia">sinton.ia</option>
<option value="alyssa">alyssa</option>
<option value="work">work</option>
<option value="personal">personal</option>
<option value="edge">edge crew</option>
</select>
<label>Send to</label>
<select id="ship-dest">
<option value="clipboard">Copy to Clipboard</option>
<option value="inbox">Drop to Inbox (Tailscale)</option>
</select>
<div class="modal-actions">
<button class="cancel" onclick="closeShipModal()">Cancel</button>
<button class="confirm" onclick="shipIt()">Ship It</button>
</div>
<div class="ship-status" id="ship-status"></div>
</div>
</div>
<script>
let pin='',storedPin='',messages=[],isStreaming=false,recognition=null,isRecording=false;
const INBOX_URL='https://gct.tail81a309.ts.net/drop';

function pinInput(n){if(pin.length>=4)return;pin+=n;updateDots();if(pin.length===4)checkPin()}
function pinDelete(){pin=pin.slice(0,-1);updateDots();document.getElementById('pin-error').textContent=''}
function updateDots(){document.querySelectorAll('.pin-dot').forEach(function(d,i){d.classList.toggle('filled',i<pin.length)})}

async function checkPin(){
  try{
    var r=await fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin})});
    if(r.ok){storedPin=pin;localStorage.setItem('sm_pin',pin);enterChat()}
    else{document.getElementById('pin-error').textContent='Wrong PIN';pin='';updateDots()}
  }catch(e){document.getElementById('pin-error').textContent='Connection error';pin='';updateDots()}
}

function enterChat(){
  document.getElementById('pin-screen').style.display='none';
  document.getElementById('chat-screen').style.display='flex';
  loadHistory();
  document.getElementById('input').focus();
}

function loadHistory(){
  try{var s=localStorage.getItem('sm_messages');if(s){messages=JSON.parse(s);messages.forEach(function(m){appendBubble(m.role,m.content,false)});scrollBottom()}}
  catch(e){messages=[]}
}

function saveHistory(){try{localStorage.setItem('sm_messages',JSON.stringify(messages.slice(-40)))}catch(e){}}

function appendBubble(role,content,scroll){
  if(scroll===undefined)scroll=true;
  var el=document.createElement('div');
  el.className='msg '+role;
  el.textContent=content;
  document.getElementById('messages').appendChild(el);
  if(scroll)scrollBottom();
  return el;
}

function scrollBottom(){var mc=document.getElementById('messages');mc.scrollTop=mc.scrollHeight}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}}

async function sendMessage(){
  var input=document.getElementById('input');
  var text=input.value.trim();
  if(!text||isStreaming)return;
  messages.push({role:'user',content:text});
  appendBubble('user',text);
  input.value='';autoResize();
  isStreaming=true;
  document.getElementById('send-btn').disabled=true;
  var thinking=appendBubble('thinking','Thinking...');
  try{
    var r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:storedPin,messages:messages})});
    var data=await r.json();
    thinking.remove();
    if(data.error){appendBubble('assistant','Error: '+data.error)}
    else{messages.push({role:'assistant',content:data.reply});appendBubble('assistant',data.reply);saveHistory()}
  }catch(err){thinking.remove();appendBubble('assistant','Connection error: '+err.message)}
  isStreaming=false;
  document.getElementById('send-btn').disabled=false;
}

function clearChat(){if(!confirm('Clear conversation?'))return;messages=[];document.getElementById('messages').innerHTML='';localStorage.removeItem('sm_messages')}

function toggleVoice(){
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){alert('Voice not supported');return}
  var btn=document.getElementById('mic-btn');
  if(isRecording){recognition.stop();return}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  recognition=new SR();
  recognition.continuous=false;recognition.interimResults=false;recognition.lang='en-US';
  recognition.onstart=function(){isRecording=true;btn.classList.add('recording')};
  recognition.onresult=function(e){document.getElementById('input').value+=e.results[0][0].transcript;autoResize()};
  recognition.onend=function(){isRecording=false;btn.classList.remove('recording')};
  recognition.onerror=function(){isRecording=false;btn.classList.remove('recording')};
  recognition.start();
}

function openShipModal(){if(messages.length===0){alert('Nothing to ship');return}document.getElementById('ship-modal').classList.add('show');document.getElementById('ship-status').textContent=''}
function closeShipModal(){document.getElementById('ship-modal').classList.remove('show')}

async function shipIt(){
  var title=document.getElementById('ship-title').value||'Sinton.ia Mobile Export';
  var tag=document.getElementById('ship-tag').value;
  var dest=document.getElementById('ship-dest').value;
  var status=document.getElementById('ship-status');
  status.textContent='Exporting...';
  try{
    var r=await fetch('/api/export',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:storedPin,messages:messages,title:title,tag:tag})});
    var data=await r.json();
    if(dest==='clipboard'){
      await navigator.clipboard.writeText(data.markdown);
      status.textContent='Copied to clipboard!';status.style.color='#4CAF50';
    }else{
      try{
        var drop=await fetch(INBOX_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:'['+tag+'] '+title+'\n\n'+data.markdown,source:'sintonia-mobile'})});
        if(drop.ok){status.textContent='Dropped to inbox!';status.style.color='#4CAF50'}
        else{status.textContent='Inbox failed - copied to clipboard';status.style.color='#ff9800';await navigator.clipboard.writeText(data.markdown)}
      }catch(e){status.textContent='Tailscale unreachable - copied to clipboard';status.style.color='#ff9800';await navigator.clipboard.writeText(data.markdown)}
    }
    setTimeout(closeShipModal,2000);
  }catch(err){status.textContent='Error: '+err.message;status.style.color='#d32f2f'}
}

var textarea=document.getElementById('input');
textarea.addEventListener('input',autoResize);
function autoResize(){textarea.style.height='auto';textarea.style.height=Math.min(textarea.scrollHeight,120)+'px'}

var savedPin=localStorage.getItem('sm_pin');
if(savedPin){
  pin=savedPin;storedPin=savedPin;
  fetch('/api/auth',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:savedPin})}).then(function(r){if(r.ok)enterChat()}).catch(function(){});
}
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js')}
</script>
</body>
</html>
